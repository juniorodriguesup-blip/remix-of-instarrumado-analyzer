  <!-- Curved swoosh at the bottom -->
  <path fill="url(#grad)" d="M276 310c0 40-20 75-50 95l-15 10c-8 5-16 2-19-6l-35-80c-3-8 2-16 10-16h90c11 0 19 9 19 20z"/>

  <!-- Ambient glows -->
