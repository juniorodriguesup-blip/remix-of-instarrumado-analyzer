  <ellipse cx="330" cy="330" rx="120" ry="120" fill="#833AB4" opacity="0.1" filter="url(#g2)"/>
  <ellipse cx="260" cy="150" rx="100" ry="100" fill="#FCAF45" opacity="0.08" filter="url(#g3)"/>

  <defs>
    <filter id="g1"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="45"/></filter>
    <filter id="g3"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
</svg>
